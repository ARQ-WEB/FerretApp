services:

  postgres:
    image: postgres:16-alpine
    container_name: ferretapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ferretapp        # crea la base de datos automáticamente
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ferretapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ferretapp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ferretapp
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      PORT: 8080
    ports:
      - "8080:8080"
    mem_limit: 768m

volumes:
  postgres_data:
    driver: local