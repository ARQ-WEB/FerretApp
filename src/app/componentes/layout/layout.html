<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <svg viewBox="0 0 100 100" class="logo-icon" fill="none" stroke="currentColor">
        <circle cx="65" cy="50" r="30" stroke-width="3"/>
        <circle cx="35" cy="50" r="5" stroke-width="2" fill="currentColor"/>
        <line x1="50" y1="20" x2="50" y2="80" stroke-width="3"/>
        <line x1="45" y1="30" x2="55" y2="30" stroke-width="3"/>
        <line x1="45" y1="70" x2="55" y2="70" stroke-width="3"/>
        <path d="M 20 50 L 25 45 L 30 50 L 35 45 L 40 50 L 45 45 L 50 50" stroke-width="3" fill="none"/>
        <path d="M 55 60 Q 60 55, 65 60 Q 70 65, 65 70 Q 60 65, 55 60 Z" fill="currentColor" stroke="none"/>
      </svg>
      <span class="logo-nombre">FERRETAPP</span>
    </div>

    <!-- Navegación -->
    <nav class="sidebar-nav">

      <!-- Dashboard — admin y vendedor -->
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2"/>
          <rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2"/>
          <rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2"/>
          <rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2"/>
        </svg>
        Dashboard
      </a>

      <!-- Inventario — admin y vendedor -->
      <a routerLink="/inventario" routerLinkActive="active" class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2" d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
          <path stroke-width="2" d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
        </svg>
        Inventario
      </a>

      <!-- Ventas — admin y vendedor -->
      <a routerLink="/ventas" routerLinkActive="active" class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.4 5h12.8"/>
          <circle cx="9" cy="21" r="1" stroke-width="2"/>
          <circle cx="20" cy="21" r="1" stroke-width="2"/>
        </svg>
        Ventas
      </a>

      <!-- Solo admin -->
      @if (esAdmin) {
        <a routerLink="/proveedores" routerLinkActive="active" class="nav-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="2" d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4" stroke-width="2"/>
            <path stroke-width="2" d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
          </svg>
          Proveedores
        </a>

        <a routerLink="/pedidos" routerLinkActive="active" class="nav-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1" stroke-width="2"/>
            <path stroke-width="2" d="M9 12h6M9 16h4"/>
          </svg>
          Pedidos
        </a>

        <a routerLink="/reportes" routerLinkActive="active" class="nav-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="2" d="M18 20V10M12 20V4M6 20v-6"/>
          </svg>
          Reportes
        </a>

        <a routerLink="/usuarios" routerLinkActive="active" class="nav-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="2" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4" stroke-width="2"/>
          </svg>
          Usuarios
        </a>

        <a routerLink="/auditoria" routerLinkActive="active" class="nav-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1" stroke-width="2"/>
            <path stroke-width="2" d="M9 12h6M9 16h4"/>
          </svg>
          Auditoría
        </a>
      }

    </nav>

    <!-- Usuario y cerrar sesión -->
    <div class="sidebar-footer">
      <div class="usuario-info">
        <div class="usuario-avatar">{{ inicialUsuario }}</div>
        <div class="usuario-datos">
          <p class="usuario-nombre">{{ usuario?.username }}</p>
          <p class="usuario-rol">{{ esAdmin ? 'Administrador' : 'Vendedor' }}</p>
        </div>
      </div>
      <button class="btn-cerrar-sesion" (click)="cerrarSesion()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Cerrar sesión
      </button>
    </div>

  </aside>

  
  <main class="contenido">
    <router-outlet />
  </main>

</div>
